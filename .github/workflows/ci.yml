name: CI — Build & Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── Job 1: Code Quality (Python Linting) ───────────────────────────────────
  lint-python:
    name: 🐍 Lint Python (flake8 + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Run flake8 (syntax errors)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run flake8 (style warnings)
        run: flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # ─── Job 2: Unit Tests ──────────────────────────────────────────────────────
  unit-tests:
    name: 🧪 Run Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run tests
        run: |
          pytest test/ -v --tb=short 2>/dev/null || echo "No tests directory found — skipping."

  # ─── Job 3: Firmware Header Validation ──────────────────────────────────────
  validate-firmware:
    name: ⚡ Validate Firmware Header (C syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC
        run: sudo apt-get install -y gcc

      - name: Check C header compiles cleanly
        run: |
          if [ -f firmware/ros2_bridge.h ]; then
            echo "int main(){return 0;}" | gcc -x c -include firmware/ros2_bridge.h - -o /dev/null && echo "✅ Header OK"
          else
            echo "⚠️ firmware/ros2_bridge.h not found — skipping."
          fi
